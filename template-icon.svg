<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  <!-- Red background circle (rounded) -->
  <rect width="800" height="800" rx="160" fill="url(#bg)"/>

  <!-- PDF Document icon -->
  <g transform="translate(200, 160)" fill="none">
    <!-- Document body -->
    <rect x="40" y="40" width="400" height="480" rx="24" fill="url(#page)" stroke="#fca5a5" stroke-width="4"/>
    <!-- Folded corner -->
    <path d="M320 40 v80 a40 40 0 0 0 40 40 h80" fill="#fef2f2" stroke="#fca5a5" stroke-width="4"/>
    <!-- PDF text -->
    <text x="240" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="140" font-weight="900" fill="#dc2626" text-anchor="middle" letter-spacing="8">PDF</text>
    <!-- Decorative lines representing content -->
    <line x1="90" y1="280" x2="390" y2="280" stroke="#fca5a5" stroke-width="6" stroke-linecap="round"/>
    <line x1="90" y1="320" x2="350" y2="320" stroke="#fca5a5" stroke-width="6" stroke-linecap="round"/>
    <line x1="90" y1="360" x2="320" y2="360" stroke="#fca5a5" stroke-width="6" stroke-linecap="round"/>
    <line x1="90" y1="400" x2="370" y2="400" stroke="#fca5a5" stroke-width="6" stroke-linecap="round"/>
    <line x1="90" y1="440" x2="300" y2="440" stroke="#fca5a5" stroke-width="6" stroke-linecap="round"/>

    <!-- Pencil icon overlay -->
    <g transform="translate(310, 380)" fill="none" stroke="#dc2626" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Pencil body -->
      <path d="M0 0 l-60 60 l-20 -20 l60 -60"/>
      <path d="M-20 40 l20 20"/>
    </g>
  </g>
</svg>
